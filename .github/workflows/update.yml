name: Update PBOC fixing tracker

on:
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "Run full 2024-present backfill"
        required: false
        default: "false"
  schedule:
    # Multiple attempts reduce the impact of delayed or dropped scheduled events.
    - cron: "20,35,50 9 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "5 10 * * 1-5"
      timezone: "Asia/Shanghai"

concurrency:
  group: pboc-fixing-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Update data and dashboard
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.full_backfill }}" = "true" ]; then EXTRA="--full"; fi
          if [ "${{ github.event_name }}" = "schedule" ]; then EXTRA="$EXTRA --skip-if-today-complete"; fi
          python scripts/update_data.py --start 2024-01-01 --wait-today $EXTRA
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pboc_fixing.csv docs/index.html docs/data.json
          git diff --cached --quiet && exit 0
          git commit -m "Update PBOC fixing data"
          git push
