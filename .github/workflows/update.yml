name: Update PBOC fixing tracker

on:
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "Run full 2024-present backfill"
        required: false
        default: "false"
  schedule:
    # 01:20 UTC = 09:20 Beijing time. Beijing has no daylight-saving time.
    - cron: "20 1 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Update data and dashboard
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.full_backfill }}" = "true" ]; then EXTRA="--full"; fi
          python scripts/update_data.py --start 2024-01-01 --wait-today $EXTRA
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pboc_fixing.csv docs/index.html docs/data.json
          git diff --cached --quiet && exit 0
          git commit -m "Update PBOC fixing data"
          git push
